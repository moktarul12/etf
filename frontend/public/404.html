<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // SPA fallback: store the requested path and redirect to root,
        // where index.html will restore it via the History API.
        sessionStorage.setItem('spa-redirect', location.pathname + location.search + location.hash);
        location.replace('/');
    </script>
</head>
<body>
    Redirecting...
</body>
</html>
